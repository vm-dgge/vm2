name: Python

on:
  workflow_dispatch:
  schedule:
    - cron: "40 */01 * * *"
  push:
    branches: ["main"]

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        id: [1,2,3,4,5]
    permissions:
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip --quiet
          if [ -f requirements.txt ]; then pip install -r requirements.txt --quiet; fi
          python -m playwright install --with-deps

      - name: Executar script Python
        env:
          URL: ${{ secrets.URL }}
          API_KEY: ${{ secrets.API_KEY }}
          LOGIN: ${{ secrets.LOGIN }}
          REF: ${{ secrets.REF }}
          MINUTOS: ${{ secrets.MINUTOS }}
          COMANDO: ${{ secrets.COMANDO }}
        timeout-minutes: 59
        continue-on-error: true
        run: python app.py

      - name: Upload da captura
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: screenshot-${{ matrix.id }}
          path: screen.png
          if-no-files-found: ignore
